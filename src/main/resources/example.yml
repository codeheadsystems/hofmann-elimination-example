context: hofmann-demo-v1
argon2MemoryKib: 65536
argon2Iterations: 3
argon2Parallelism: 1

# OPAQUE server keys — must be fixed for registrations to survive restarts.
# Both seeds are 32-byte values encoded as hex (64 hex chars).
# Generate your own with: openssl rand -hex 32
serverKeySeedHex: "0102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f20"
oprfSeedHex:      "2122232425262728292a2b2c2d2e2f303132333435363738393a3b3c3d3e3f40"

# OPRF master key for the standalone /api/oprf endpoint.
# Generate your own with: openssl rand -hex 32
oprfMasterKeyHex: "4142434445464748494a4b4c4d4e4f505152535455565758595a5b5c5d5e5f60"

# JWT signing secret — tokens signed with this key are valid for jwtTtlSeconds.
# If not set, a random secret is generated on each startup, invalidating all tokens.
# Generate your own with: openssl rand -hex 32
jwtSecretHex: "6162636465666768696a6b6c6d6e6f707172737475767778797a7b7c7d7e7f80"

# H2 file-mode database — persists across restarts in ./data/
databaseUrl: "jdbc:h2:file:./data/hofmann-example"
databaseUser: "sa"
databasePassword: ""

server:
  rootPath: /api/*
  applicationConnectors:
    - type: http
      port: 8080
  adminConnectors:
    - type: http
      port: 8081

logging:
  level: INFO
  loggers:
    com.codeheadsystems: DEBUG
