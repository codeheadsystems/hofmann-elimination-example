<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #f8f9fa;
      --surface:      #ffffff;
      --border:       #e9ecef;
      --accent:       #4361ee;
      --accent-hover: #3451d1;
      --danger:       #ef4444;
      --danger-hover: #dc2626;
      --text:         #212529;
      --muted:        #6c757d;
      --success-bg:   #d1fae5;
      --success-text: #065f46;
      --error-bg:     #fee2e2;
      --error-text:   #991b1b;
      --radius:       8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
    }

    .hidden { display: none !important; }

    /* ── Auth View ───────────────────────────────── */

    #auth-view {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
    }

    .auth-card h1 {
      font-size: 26px;
      font-weight: 700;
      text-align: center;
      letter-spacing: -0.5px;
      margin-bottom: 28px;
    }

    .tabs {
      display: flex;
      border-bottom: 2px solid var(--border);
      margin-bottom: 24px;
    }

    .tab {
      flex: 1;
      background: none;
      border: none;
      padding: 10px;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"],
    textarea {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus,
    textarea:focus {
      border-color: var(--accent);
    }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      margin-bottom: 16px;
    }

    .message.error   { background: var(--error-bg);   color: var(--error-text); }
    .message.success { background: var(--success-bg); color: var(--success-text); }

    /* ── Notes View ──────────────────────────────── */

    #notes-view {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 16px 60px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 0 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-info span {
      font-size: 14px;
      color: var(--muted);
    }

    #logout-btn {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: var(--muted);
      transition: border-color 0.15s, color 0.15s;
    }

    #logout-btn:hover {
      border-color: var(--danger);
      color: var(--danger);
    }

    /* Create form */

    .create-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 32px;
    }

    .section-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }

    #note-title {
      margin-bottom: 10px;
    }

    #note-content {
      resize: vertical;
      min-height: 80px;
      margin-bottom: 12px;
    }

    #create-error {
      margin-bottom: 10px;
    }

    /* Notes list */

    .notes-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .note-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      margin-bottom: 12px;
      transition: opacity 0.2s;
    }

    .note-card.deleting {
      opacity: 0.4;
      pointer-events: none;
    }

    .note-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .note-title {
      font-weight: 600;
      font-size: 16px;
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
      margin-left: 8px;
      transition: color 0.15s, background 0.15s;
    }

    .delete-btn:hover {
      color: var(--danger);
      background: var(--error-bg);
    }

    .note-body {
      font-size: 14px;
      color: var(--text);
      margin-bottom: 10px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .note-date {
      font-size: 12px;
      color: var(--muted);
    }

    #empty-state {
      text-align: center;
      color: var(--muted);
      padding: 40px 0;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <!-- Auth View -->
  <div id="auth-view">
    <div class="auth-card">
      <h1>Notes</h1>
      <div class="tabs">
        <button id="tab-login" class="tab active">Log In</button>
        <button id="tab-register" class="tab">Register</button>
        <button id="tab-recover" class="tab">Recover</button>
      </div>
      <div id="auth-message"></div>
      <form id="auth-form">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" autocomplete="username" placeholder="you@example.com" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" autocomplete="current-password" required />
        </div>
        <button type="submit" id="auth-submit" class="btn-primary">Log In</button>
      </form>
      <!-- Recovery form (hidden by default) -->
      <form id="recovery-form" class="hidden">
        <div class="field">
          <label for="recovery-username">Username</label>
          <input type="text" id="recovery-username" placeholder="you@example.com" required />
        </div>
        <div id="recovery-code-field" class="field hidden">
          <label for="recovery-code">Recovery Code</label>
          <input type="text" id="recovery-code" placeholder="6-digit code from server log" />
        </div>
        <div id="recovery-password-field" class="field hidden">
          <label for="recovery-password">New Password</label>
          <input type="password" id="recovery-password" />
        </div>
        <button type="submit" id="recovery-submit" class="btn-primary">Send Recovery Code</button>
      </form>
    </div>
  </div>

  <!-- Notes View -->
  <div id="notes-view" class="hidden">
    <header>
      <h1>Notes</h1>
      <div class="user-info">
        <span id="logged-in-user"></span>
        <button id="logout-btn">Logout</button>
      </div>
    </header>
    <main>
      <section class="create-section">
        <div class="section-label">Change Password</div>
        <form id="change-password-form">
          <input type="password" id="new-password" placeholder="New password" required style="margin-bottom: 10px" />
          <div id="change-password-message" class="message hidden"></div>
          <button type="submit" class="btn-primary">Change Password</button>
        </form>
      </section>
      <section class="create-section">
        <div class="section-label">New Note</div>
        <form id="create-form">
          <input type="text" id="note-title" placeholder="Title" required />
          <textarea id="note-content" placeholder="Write your note..." required></textarea>
          <div id="create-error" class="message error hidden"></div>
          <button type="submit" class="btn-primary">Create Note</button>
        </form>
      </section>
      <section>
        <div class="notes-header">
          <div class="section-label" style="margin:0">Your Notes</div>
        </div>
        <div id="notes-list"></div>
        <div id="empty-state" class="hidden">No notes yet. Create one above.</div>
      </section>
    </main>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
